{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="text-center py-5">
  <div class="glass-card p-5 mx-auto" style="max-width: 36rem;">
    <h1 class="display-1 text-primary">404</h1>
    <p class="lead">Page not found.</p>
    <p class="text-muted">The page you requested could not be found. Return to your dashboard to continue.</p>
    <a class="btn btn-primary" href="{{ url_for('dashboard.index') }}">Go Home</a>
  </div>
</div>
{% endblock %}
